# Grafana только внутри кластера (ClusterIP), без Ingress.

service:
  type: ClusterIP

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi

# Не храним пароль в репо — helm сам создаст Secret.
# Достаём так:
# kubectl -n monitoring get secret grafana -o jsonpath='{.data.admin-password}' | base64 -d; echo

# Тот же namespace, что и `helm upgrade --install prometheus ... -n monitoring` → сервис `prometheus-server`.
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server
        access: proxy
        isDefault: true

