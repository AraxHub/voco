# Лёгкая конфигурация Prometheus под один VPS (4GB RAM).
# Важно: сервис Prometheus — ClusterIP, Ingress не создаём.

alertmanager:
  enabled: false

pushgateway:
  enabled: false

server:
  service:
    type: ClusterIP
  retention: 7d
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

# Корень values: см. prometheus-community/prometheus templates/cm.yaml (tpl .Values.extraScrapeConfigs).
# Под server: — чарт НЕ подмешивает scrape_configs.
#
# 1) ingress-nginx (cloud manifest): /metrics у controller-подов на :10254
# 2) LiveKit: отдельный слушатель prometheus.port → endpoint port name prometheus
extraScrapeConfigs: |
  - job_name: "ingress-nginx"
    metrics_path: /metrics
    scheme: http
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - action: keep
        source_labels: [__meta_kubernetes_namespace]
        regex: ingress-nginx
      - action: keep
        source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        regex: ingress-nginx
      - action: keep
        source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
        regex: controller
      - source_labels: [__meta_kubernetes_pod_ip]
        regex: (.+)
        action: replace
        replacement: "${1}:10254"
        target_label: __address__

  - job_name: "livekit"
    metrics_path: /metrics
    scheme: http
    kubernetes_sd_configs:
      - role: endpoints
    relabel_configs:
      - action: keep
        source_labels: [__meta_kubernetes_namespace]
        regex: voco
      - action: keep
        source_labels: [__meta_kubernetes_service_name]
        regex: livekit-svc
      - action: keep
        source_labels: [__meta_kubernetes_endpoint_port_name]
        regex: prometheus

