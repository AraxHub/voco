# Лёгкая конфигурация Prometheus под один VPS (4GB RAM).
# Важно: сервис Prometheus — ClusterIP, Ingress не создаём.

alertmanager:
  enabled: false

pushgateway:
  enabled: false

server:
  service:
    type: ClusterIP
  retention: 7d
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

# Корень values: см. prometheus-community/prometheus templates/cm.yaml (tpl .Values.extraScrapeConfigs).
# Под server: — чарт НЕ подмешивает scrape_configs.
#
# 1) ingress-nginx (cloud manifest): /metrics у controller-подов на :10254
# 2) LiveKit: role pod + pod-ip:6789 (role endpoints с NodePort часто даёт IP ноды и ломает scrape из Pod-сети)
extraScrapeConfigs: |
  - job_name: "ingress-nginx"
    metrics_path: /metrics
    scheme: http
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - action: keep
        source_labels: [__meta_kubernetes_namespace]
        regex: ingress-nginx
      - action: keep
        source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        regex: ingress-nginx
      - action: keep
        source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
        regex: controller
      # Один pod — несколько объявленных портов → без фильтра дублируем скрейп :10254.
      - action: keep
        source_labels: [__meta_kubernetes_pod_container_port_name]
        regex: http
      # Дашборды (напр. Grafana.com 9614) в шаблонах используют фильтр `{namespace=~"…"}` по
      # TARGET-лейблам Prometheus — без этого переменные пустые и графики без данных.
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_node_name]
        action: replace
        target_label: node
      - source_labels: [__meta_kubernetes_pod_ip]
        regex: (.+)
        action: replace
        replacement: "${1}:10254"
        target_label: __address__

  - job_name: "livekit"
    metrics_path: /metrics
    scheme: http
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - voco
    relabel_configs:
      - action: keep
        source_labels: [__meta_kubernetes_pod_label_app]
        regex: livekit
      - action: keep
        source_labels: [__meta_kubernetes_pod_container_port_name]
        regex: prometheus
      - source_labels: [__meta_kubernetes_pod_ip]
        regex: (.+)
        action: replace
        replacement: "${1}:6789"
        target_label: __address__

