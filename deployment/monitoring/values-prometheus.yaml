# Лёгкая конфигурация Prometheus под один VPS (4GB RAM).
# Важно: сервис Prometheus — ClusterIP, Ingress не создаём.

alertmanager:
  enabled: false

pushgateway:
  enabled: false

server:
  service:
    type: ClusterIP
  retention: 7d
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

  # Доп. скрейп-джобы без ServiceMonitor/оператора:
  #
  # 1) ingress-nginx (upstream cloud manifest): у ingress-nginx-controller Service нет порта metrics;
  #    /metrics висит на отдельном HTTP (:10254) у подов controller.
  #
  # 2) LiveKit: prometheus.port задаёт второй слушатель; /metrics не на порту signaling (7880).
  extraScrapeConfigs: |
    - job_name: "ingress-nginx"
      metrics_path: /metrics
      scheme: http
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_namespace]
          regex: ingress-nginx
        - action: keep
          source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          regex: ingress-nginx
        - action: keep
          source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          regex: controller
        - source_labels: [__meta_kubernetes_pod_ip]
          regex: (.+)
          action: replace
          replacement: "${1}:10254"
          target_label: __address__

    - job_name: "livekit"
      metrics_path: /metrics
      scheme: http
      kubernetes_sd_configs:
        - role: endpoints
      relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_namespace]
          regex: voco
        - action: keep
          source_labels: [__meta_kubernetes_service_name]
          regex: livekit-svc
        - action: keep
          source_labels: [__meta_kubernetes_endpoint_port_name]
          regex: prometheus

