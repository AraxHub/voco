apiVersion: v1
kind: ConfigMap
metadata:
  name: voco-backend-env
  namespace: voco
data:
  VOCO_DEV_MODE: "false"

  # Returned to the browser; must be reachable from users.
  VOCO_LIVEKIT_URL: "ws://155.212.190.163:7880"

  # Used by backend to generate joinUrl.
  VOCO_SERVER_BASE_URL: "http://155.212.190.163"

  # CORS: allow your frontend origin.
  VOCO_SERVER_CORS_ALLOWED_ORIGINS: "http://155.212.190.163"

  # Logging defaults (override via env if desired)
  VOCO_LOG_FORMAT: "text"
  VOCO_LOG_LEVEL: "info"
  VOCO_LOG_SERVICE: "voco-backend"
  VOCO_LOG_ENV: "prod"
