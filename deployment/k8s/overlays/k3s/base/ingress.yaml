apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voco
  namespace: voco
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.voco-online.ru
      secretName: voco-web-tls
  rules:
    - host: www.voco-online.ru
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: voco-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voco-frontend
                port:
                  number: 80
