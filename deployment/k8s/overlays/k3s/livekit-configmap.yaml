apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: voco
data:
  livekit.yaml: |
    port: 7880

    prometheus:
      port: 6789

    logging:
      level: info

    rtc:
      udp_port: 62000
      tcp_port: 7881
      port_range_start: 62000
      port_range_end: 62020

    # keys — имя записи ДО ':' = VOCO_LIVEKIT_API_KEY, значение = VOCO_LIVEKIT_API_SECRET
    # (должно совпадать с секретом voco-secrets; строка ниже только для локального dev)
    keys:
      devkey: devsecret
