apiVersion: apps/v1
kind: Deployment
metadata:
  name: voco-backend
  namespace: voco
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voco-backend
  template:
    metadata:
      labels:
        app: voco-backend
    spec:
      containers:
        - name: backend
          image: voco-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

